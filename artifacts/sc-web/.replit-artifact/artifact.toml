kind = "web"
previewPath = "/sc-web/"
title = "Second Chance - Web"
version = "1.0.0"
id = "artifacts/sc-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20454
name = "web"
paths = ["/sc-web/"]

[services.development]
run = "pnpm --filter @workspace/sc-web run dev"

[services.env]
PORT = "20454"
BASE_PATH = "/sc-web/"

[services.production]
build = ["pnpm", "--filter", "@workspace/sc-web", "run", "build"]
publicDir = "artifacts/sc-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
